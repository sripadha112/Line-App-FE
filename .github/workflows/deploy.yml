name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Change to 'master' if that's your default branch
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for pushing to gh-pages branch
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web app
        run: npm run build:web
        env:
          NODE_ENV: production
      
      - name: Check and fix dist structure
        run: |
          echo "Checking dist structure:"
          ls -la dist/ || echo "dist not found"
          
          # Expo might create index.html in a subdirectory
          if [ ! -f "dist/index.html" ] && [ -d "dist/_expo" ]; then
            echo "Found _expo directory, checking for static files"
            find dist/_expo -name "index.html" -type f
            if [ -d "dist/_expo/static/js/web" ]; then
              echo "Moving files from _expo/static/js/web to root"
              cp -r dist/_expo/static/js/web/* dist/
            fi
          fi
          
          # Ensure index.html exists at root
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: index.html not found in dist/"
            find dist/ -name "index.html" -type f
          else
            echo "SUCCESS: index.html found at dist/index.html"
          fi
      
      - name: Copy CNAME to dist
        run: cp CNAME dist/CNAME
      
      - name: Copy .nojekyll to dist
        run: cp .nojekyll dist/.nojekyll
      
      - name: Copy booking folder to dist
        run: |
          if [ -d "web/booking" ]; then
            cp -r web/booking dist/booking
            echo "✅ Copied booking folder"
          else
            echo "⚠️  Booking folder not found, skipping"
          fi
      
      - name: Verify SEO files
        run: |
          echo "Checking for SEO files in dist:"
          ls -la dist/ | grep -E "robots.txt|sitemap.xml|.htaccess|browserconfig.xml"
          if [ -f "dist/robots.txt" ]; then echo "✅ robots.txt"; fi
          if [ -f "dist/sitemap.xml" ]; then echo "✅ sitemap.xml"; fi
          if [ -f "dist/.htaccess" ]; then echo "✅ .htaccess"; fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: neextapp.com
          commit_message: 'Deploy to GitHub Pages'
